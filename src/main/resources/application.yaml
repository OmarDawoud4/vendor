spring:
  application:
    name: ecommerce-backend

  # Database
  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce_xdb
    username: ecommerce_user
    password: ecommerce_pass
    driver-class-name: org.postgresql.Driver


  # JPA
  jpa:
    hibernate:
      ddl-auto: validate # iwill try flyway

    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway
  flyway:
    community-db-support-enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379


# --- App-level config (custom) ---
app:
  jwt:
    secret: "change-me-to-a-long-random-secret"
    expiration-ms: 86400000        # 24 hours
  inventory:
    reservation-minutes: 15
  idempotency:
    ttl-seconds: 86400             # 24 hours

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.security: INFO